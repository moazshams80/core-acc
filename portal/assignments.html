<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assignments — CORE Egypt Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="portal.css" />
</head>
<body data-page="assignments">
  <div class="portal-shell">
    <aside class="portal-sidebar" id="portalSidebar"></aside>
    <div class="portal-overlay" id="portalOverlay"></div>
    <div class="portal-content">
      <header class="portal-header" id="portalHeader"></header>
      <main class="portal-main">

        <div class="filter-tabs" id="filters">
          <button class="active" data-filter="all">All</button>
          <button data-filter="pending" data-i18n="Pending">Pending</button>
          <button data-filter="submitted" data-i18n="Submitted">Submitted</button>
          <button data-filter="graded" data-i18n="Graded">Graded</button>
        </div>

        <section class="card card-pad">
          <div class="table-wrap">
            <table class="data">
              <thead><tr><th data-i18n="Assignment">Assignment</th><th data-i18n="Course">Course</th><th data-i18n="Due">Due</th><th data-i18n="Status">Status</th><th data-i18n="Grade / Action">Grade / Action</th></tr></thead>
              <tbody id="rows"></tbody>
            </table>
          </div>
          <div id="empty"></div>
        </section>

      </main>
    </div>
  </div>

  <!-- Submit modal -->
  <div class="portal-modal" id="submitModal">
    <div class="backdrop" data-modal-close></div>
    <div class="modal-card">
      <div class="modal-head"><h3 data-i18n="Submit Assignment">Submit Assignment</h3><button class="modal-close" data-modal-close aria-label="Close">×</button></div>
      <p class="muted" id="submitFor" style="margin-top:0;"></p>
      <form class="stack" id="submitForm">
        <div><label class="field-label">Notes for your instructor</label><textarea class="textarea" id="submitNotes" placeholder="Add any notes about your submission…"></textarea></div>
        <div><label class="field-label">Attach your work</label><input class="input" type="file" id="submitFile" />
          <p class="muted" style="margin:6px 0 0;font-size:12px;">PDF, images, documents or archives — up to 50 MB. Only you and your instructor can open it.</p></div>
        <button type="submit" class="btn btn-primary btn-block" data-i18n="Submit Assignment">Submit Assignment</button>
      </form>
    </div>
  </div>

  <!-- Protected brief modal -->
  <div class="portal-modal" id="briefModal">
    <div class="backdrop" data-modal-close></div>
    <div class="modal-card">
      <div class="modal-head"><h3 id="briefTitle">Assignment Brief</h3><button class="modal-close" data-modal-close aria-label="Close">×</button></div>
      <div class="protected-content" id="briefProtected"><div id="briefBody"></div></div>
    </div>
  </div>

  <script src="mock-data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="db.js"></script>
  <script src="icons.js"></script>
  <script src="i18n.js"></script>
  <script src="portal.js"></script>
  <script>
    portalBoot(function () {
    function render(filter) {
      var list = assignments.filter(function (a) { return filter === "all" || a.status === filter; });
      var tbody = document.getElementById("rows");
      var empty = document.getElementById("empty");
      if (!list.length) {
        tbody.innerHTML = "";
        empty.innerHTML = '<div class="empty-state"><div class="es-ico">' + ICON("check") + '</div><h3>Nothing here</h3><p>No assignments match this filter.</p></div>';
        return;
      }
      empty.innerHTML = "";
      tbody.innerHTML = list.map(function (a) {
        var course = courseById(a.courseId);
        var soon = a.status === "pending" && daysUntil(a.dueDate) <= 2 && daysUntil(a.dueDate) >= 0;
        var due = '<span class="' + (soon ? "due-soon" : "") + '">' + prettyDate(a.dueDate) + (soon ? " " + ICON("alert", 12) : "") + "</span>";
        var action;
        if (a.status === "graded") action = '<span class="badge badge-success">' + esc(a.grade) + "</span>";
        else if (a.status === "submitted") action = '<span class="muted">Awaiting grade</span>';
        else action = '<button class="btn btn-primary btn-sm" data-modal-open="submitModal" data-aid="' + a.id + '" data-cid="' + a.courseId + '" data-title="' + esc(a.title) + '">Submit</button>';
        return "<tr><td><b>" + esc(a.title) + "</b><br>" +
            "<button type='button' class='card-link' data-brief='" + a.id + "' style='background:none;border:0;padding:0;cursor:pointer;color:var(--core-blue);font-weight:700;font-size:13px;'>View brief</button></td>" +
          '<td><span class="tag">' + esc(course.title) + "</span></td>" +
          "<td>" + due + "</td>" +
          "<td>" + badgeHTML(a.status) + "</td>" +
          "<td>" + action + "</td></tr>";
      }).join("");
    }
    var filterBar = document.getElementById("filters");
    function setActive(filter) {
      filterBar.querySelectorAll("button").forEach(function (x) {
        x.classList.toggle("active", x.getAttribute("data-filter") === filter);
      });
    }
    filterBar.addEventListener("click", function (e) {
      var b = e.target.closest("[data-filter]"); if (!b) return;
      activeFilter = b.getAttribute("data-filter");
      setActive(activeFilter);
      render(activeFilter);
    });
    // set modal subtitle + remember which assignment is being submitted
    var submittingId = null, submittingCourse = null;
    document.addEventListener("click", function (e) {
      var b = e.target.closest('[data-modal-open="submitModal"]');
      if (b) {
        submittingId = b.getAttribute("data-aid");
        submittingCourse = b.getAttribute("data-cid");
        document.getElementById("submitFor").textContent = b.getAttribute("data-title");
      }
    });
    var activeFilter = "all";
    document.getElementById("submitForm").addEventListener("submit", function (e) {
      e.preventDefault();
      var notes = document.getElementById("submitNotes").value.trim();
      var fileInput = document.getElementById("submitFile");
      var file = fileInput.files[0];
      var btn = this.querySelector('button[type="submit"]');
      function finish() {
        document.getElementById("submitModal").classList.remove("open");
        document.getElementById("submitNotes").value = "";
        fileInput.value = "";
        btn.disabled = false; btn.textContent = "Submit Assignment";
        showToast("Assignment submitted!");
      }
      if (file && file.size > 50 * 1024 * 1024) { showToast("File is larger than 50 MB"); return; }
      if (dbReady() && submittingId) {
        btn.disabled = true; btn.textContent = file ? "Uploading…" : "Submitting…";
        dbSubmitAssignmentWithFile(submittingId, submittingCourse, notes, file, function (err) {
          if (err) { btn.disabled = false; btn.textContent = "Submit Assignment"; showToast("Could not submit: " + err); return; }
          var a = assignments.find(function (x) { return x.id === submittingId; });
          if (a) a.status = "submitted";
          finish();
          render(activeFilter);
        });
        return;
      }
      finish(); // demo mode
    });
    // Protected assignment brief viewer
    document.addEventListener("click", function (e) {
      var b = e.target.closest("[data-brief]"); if (!b) return;
      var a = assignments.find(function (x) { return x.id === b.getAttribute("data-brief"); });
      var course = courseById(a.courseId);
      document.getElementById("briefTitle").textContent = a.title;
      document.getElementById("briefBody").innerHTML =
        "<p class='muted' style='margin-top:0;'>" + esc(course.title) + " · due " + prettyDate(a.dueDate) + "</p>" +
        "<p>Complete the tasks described in this brief and submit your work before the due date. This brief is protected course material — copying, printing, and screenshots are disabled, and it is watermarked to your account.</p>";
      document.getElementById("briefModal").classList.add("open");
    });
    // honor ?filter= deep links (e.g. from the dashboard)
    var valid = ["all", "pending", "submitted", "graded"];
    var initial = new URLSearchParams(location.search).get("filter");
    if (valid.indexOf(initial) === -1) initial = "all";
    activeFilter = initial;
    setActive(initial);
    render(initial);
    });
  </script>
</body>
</html>
