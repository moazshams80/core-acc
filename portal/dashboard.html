<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — CORE Egypt Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="portal.css" />
</head>
<body data-page="dashboard">
  <div class="portal-shell">
    <aside class="portal-sidebar" id="portalSidebar"></aside>
    <div class="portal-overlay" id="portalOverlay"></div>
    <div class="portal-content">
      <header class="portal-header" id="portalHeader"></header>
      <main class="portal-main">

        <div id="banner"></div>

        <div class="grid grid-4" style="margin-bottom:24px;" id="stats"></div>

        <div class="row-2">
          <section class="card card-pad">
            <div class="between" style="margin-bottom:16px;">
              <h2 class="section-title" style="font-size:20px;">Continue Learning</h2>
              <a href="courses.html" class="muted" style="font-weight:700;font-size:14px;">View all →</a>
            </div>
            <div class="stack" id="continue"></div>
          </section>

          <section class="card card-pad">
            <h2 class="section-title" style="font-size:20px;margin-bottom:8px;">Upcoming</h2>
            <div id="upcoming"></div>
          </section>
        </div>

        <section class="card card-pad" style="margin-top:22px;">
          <h2 class="section-title" style="font-size:20px;margin-bottom:18px;">Recent Activity</h2>
          <ul class="timeline" id="activity"></ul>
        </section>

      </main>
    </div>
  </div>

  <script src="mock-data.js"></script>
  <script src="portal.js"></script>
  <script>
    // Welcome banner
    document.getElementById("banner").innerHTML =
      '<div class="portal-banner"><h2>Welcome back, ' + esc(currentStudent.name) + ' 👋</h2>' +
      '<p>' + esc(currentStudent.program) + ' &middot; Day ' + currentStudent.dayOfJourney + ' of your journey</p></div>';

    // Stat cards
    var inProgress = courses.filter(function (c) { return c.status === "in-progress"; }).length;
    var dueSoon = assignments.filter(function (a) { return a.status === "pending" && daysUntil(a.dueDate) <= 2 && daysUntil(a.dueDate) >= 0; }).length;
    var statData = [
      { ico: "📚", num: inProgress, label: "Courses in Progress", href: "courses.html?filter=in-progress" },
      { ico: "📝", num: dueSoon, label: "Assignments Due", href: "assignments.html?filter=pending" },
      { ico: "📅", num: overallAttendance + "%", label: "Attendance Rate", href: "attendance.html" },
      { ico: "📊", num: overallGrade, label: "Overall Grade", href: "grades.html" },
    ];
    document.getElementById("stats").innerHTML = statData.map(function (s) {
      return '<a class="portal-stat-card" href="' + s.href + '"><span class="ico" aria-hidden="true">' + s.ico + '</span>' +
             '<div><strong>' + s.num + "</strong><span>" + s.label + "</span></div></a>";
    }).join("");

    // Continue learning (in-progress courses)
    document.getElementById("continue").innerHTML = courses.filter(function (c) { return c.status === "in-progress"; }).map(function (c) {
      return '<div class="list-row"><span class="course-icon" aria-hidden="true">' + c.icon + "</span>" +
        '<div class="grow"><b>' + esc(c.title) + "</b>" + progressHTML(c.progress, true) + "</div>" +
        '<a class="btn btn-light btn-sm" href="course-detail.html?id=' + c.id + '">Resume</a></div>';
    }).join("");

    // Upcoming — mix of next assignments due + live sessions
    var upItems = [];
    assignments.filter(function (a) { return a.status === "pending"; }).forEach(function (a) {
      upItems.push({ kind: "Assignment", tag: "badge-info", title: a.title, when: prettyDate(a.dueDate), sort: daysUntil(a.dueDate), href: "assignments.html?filter=pending" });
    });
    liveSessions.filter(function (s) { return !s.past; }).forEach(function (s, i) {
      upItems.push({ kind: "Live Session", tag: "badge-cyan", title: s.title, when: s.when, sort: i + 0.5, href: "live-sessions.html" });
    });
    upItems.sort(function (a, b) { return a.sort - b.sort; });
    document.getElementById("upcoming").innerHTML = upItems.slice(0, 4).map(function (u) {
      return '<a class="mini-item" href="' + u.href + '"><div class="grow"><span class="badge ' + u.tag + '">' + u.kind + "</span>" +
        '<div style="font-weight:700;margin-top:6px;">' + esc(u.title) + "</div>" +
        '<div class="when">' + esc(u.when) + "</div></div><span class="muted" aria-hidden="true">›</span></a>";
    }).join("");

    // Recent activity timeline (gold dot for certificate events)
    document.getElementById("activity").innerHTML = recentActivity.map(function (a) {
      return '<li><span class="dot ' + (a.cert ? "gold" : "") + '" aria-hidden="true">' + a.icon + "</span>" +
        '<a class="t-link" href="' + a.link + '">' + a.text + '<div class="t-time">' + esc(a.time) + "</div></a></li>";
    }).join("");
  </script>
</body>
</html>
