<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose a new password — CORE Egypt Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="portal.css" />
</head>
<body>
  <div class="login-wrap">
    <aside class="login-aside">
      <span class="brand-mark">C</span>
      <h1>Choose a new<br />password.</h1>
      <p>Pick something at least 8 characters long that you don't use anywhere else.</p>
      <svg width="320" height="160" viewBox="0 0 320 160" fill="none" aria-hidden="true" style="margin-top:36px;opacity:.5;">
        <g stroke="#22a7e0" stroke-width="1.5">
          <path d="M10 130 H110 L150 90 H250" /><path d="M10 80 H70 L100 50 H300" /><path d="M40 150 V110 L80 70" />
        </g>
        <g fill="#22a7e0">
          <circle cx="110" cy="130" r="4" /><circle cx="150" cy="90" r="4" /><circle cx="250" cy="90" r="4" />
          <circle cx="70" cy="80" r="4" /><circle cx="100" cy="50" r="4" /><circle cx="80" cy="70" r="4" />
        </g>
      </svg>
    </aside>

    <main class="login-form-panel">
      <div class="login-form-card card card-pad">
        <p class="kicker">Password Reset</p>
        <h2 class="section-title" style="margin-bottom:6px;" data-i18n="Set a new password">Set a new password</h2>
        <p class="muted" style="margin:0 0 22px;font-size:14px;" id="intro">Checking your reset link…</p>

        <form id="resetForm" class="stack" autocomplete="off" style="display:none;">
          <div>
            <label class="field-label" for="pwd" data-i18n="New password">New password</label>
            <div class="password-field">
              <input class="input" id="pwd" type="password" placeholder="At least 8 characters" data-i18n-ph="At least 8 characters" minlength="8" required />
              <button type="button" class="toggle-pass" id="togglePass" aria-label="Show password"><svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
            </div>
          </div>
          <div>
            <label class="field-label" for="pwd2" data-i18n="Confirm new password">Confirm new password</label>
            <input class="input" id="pwd2" type="password" placeholder="Re-enter password" data-i18n-ph="Re-enter password" required />
            <p id="msg" style="display:none;margin:8px 0 0;font-size:13px;font-weight:700;color:#c0392b;"></p>
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="saveBtn" data-i18n="Update password">Update password</button>
        </form>

        <div id="badLink" style="display:none;">
          <p class="muted" style="margin:0 0 16px;">This reset link is invalid or has expired. Reset links can only be used once.</p>
          <a class="btn btn-primary btn-block" href="forgot-password.html" data-i18n="Request a new link">Request a new link</a>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="db.js"></script>
  <script src="icons.js"></script>
  <script src="i18n.js"></script>
  <script src="portal.js"></script>
  <script>
    var form = document.getElementById("resetForm");
    var intro = document.getElementById("intro");
    var msg = document.getElementById("msg");

    function fail(text) { msg.textContent = text; msg.style.display = "block"; }

    document.getElementById("togglePass").addEventListener("click", function () {
      var p = document.getElementById("pwd");
      var show = p.type === "password";
      p.type = show ? "text" : "password";
      this.innerHTML = show ? ICON("eye-off") : ICON("eye");
    });

    /* Supabase puts a recovery session in the URL fragment when the user
       arrives from the email link. Wait for it before showing the form. */
    function ready() {
      intro.textContent = "Pick a new password for your account.";
      form.style.display = "";
    }
    function expired() {
      intro.style.display = "none";
      document.getElementById("badLink").style.display = "block";
    }

    if (!dbReady()) {
      intro.textContent = "Password reset needs the live database.";
    } else {
      sb.auth.onAuthStateChange(function (event) {
        if (event === "PASSWORD_RECOVERY" || event === "SIGNED_IN") ready();
      });
      sb.auth.getSession().then(function (r) {
        if (r.data && r.data.session) ready();
        else setTimeout(function () {
          sb.auth.getSession().then(function (r2) {
            if (r2.data && r2.data.session) ready(); else expired();
          });
        }, 1200);
      });
    }

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      msg.style.display = "none";
      var p1 = document.getElementById("pwd").value;
      var p2 = document.getElementById("pwd2").value;
      if (!validatePassword(p1)) { fail(passwordTooShortMsg()); return; }
      if (p1 !== p2) { fail("Passwords do not match."); return; }
      var btn = document.getElementById("saveBtn");
      btn.disabled = true; btn.textContent = "Updating…";
      dbUpdatePassword(p1, function (err) {
        if (err) { btn.disabled = false; btn.textContent = "Update password"; fail(err); return; }
        showToast("Password updated — signing you in…");
        setTimeout(function () {
          sb.from("profiles").select("role").single().then(function (p) {
            var role = p.data && p.data.role;
            var teacher = role === "teacher" || role === "admin";
            try {
              sessionStorage.setItem("loggedIn", "true");
              sessionStorage.setItem("role", teacher ? "teacher" : "student");
            } catch (e2) {}
            window.location.href = teacher ? "teacher-dashboard.html" : "dashboard.html";
          });
        }, 900);
      });
    });
  </script>
</body>
</html>
