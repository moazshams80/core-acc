<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Builder — CORE Egypt Instructor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="portal.css" />
</head>
<body data-page="teacher-course-builder" data-role="teacher">
  <div class="portal-shell">
    <aside class="portal-sidebar" id="portalSidebar"></aside>
    <div class="portal-overlay" id="portalOverlay"></div>
    <div class="portal-content">
      <header class="portal-header" id="portalHeader"></header>
      <main class="portal-main">

        <a href="teacher-courses.html" class="muted" style="font-weight:700;display:inline-block;margin-bottom:16px;">← Back to courses</a>
        <h2 class="section-title" id="builderTitle" style="font-size:22px;margin-bottom:18px;">Create New Course</h2>

        <!-- Course Info -->
        <section class="card card-pad" style="margin-bottom:20px;">
          <h3 style="color:var(--core-navy);margin-bottom:14px;">Course Info</h3>
          <div class="stack" style="max-width:680px;">
            <div><label class="field-label">Course title</label><input class="input" id="cTitle" placeholder="e.g. Security Systems Engineering" /></div>
            <div><label class="field-label">Discipline</label>
              <select class="select" id="cDiscipline">
                <option>Security Systems Engineering</option>
                <option>Fire Alarm Systems Engineering</option>
                <option>Building Management Systems</option>
                <option>Data Center Infrastructure</option>
                <option>Network Engineering</option>
                <option>Audio Visual Systems</option>
              </select>
            </div>
            <div><label class="field-label">Description</label><textarea class="textarea" id="cDesc" placeholder="What will students learn in this course?"></textarea></div>
            <div><label class="field-label">Course icon</label>
              <div class="icon-picker">
                <input type="radio" name="icon" id="i1" checked /><label for="i1"><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></label>
                <input type="radio" name="icon" id="i2" /><label for="i2"><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2s4 4 4 8a4 4 0 0 1-8 0c0-1.5.5-2.5 1-3.5C10 8 12 6 12 2z"/><path d="M9 14a3 3 0 0 0 6 0c0-2-2-3-3-5-1 2-3 3-3 5z"/></svg></label>
                <input type="radio" name="icon" id="i3" /><label for="i3"><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="2" width="16" height="20" rx="1"/><line x1="9" y1="6" x2="9" y2="6.01"/><line x1="15" y1="6" x2="15" y2="6.01"/><line x1="9" y1="10" x2="9" y2="10.01"/><line x1="15" y1="10" x2="15" y2="10.01"/><line x1="9" y1="14" x2="9" y2="14.01"/><line x1="15" y1="14" x2="15" y2="14.01"/><path d="M9 22v-4h6v4"/></svg></label>
                <input type="radio" name="icon" id="i4" /><label for="i4"><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="8" rx="2"/><rect x="2" y="13" width="20" height="8" rx="2"/><line x1="6" y1="7" x2="6.01" y2="7"/><line x1="6" y1="17" x2="6.01" y2="17"/></svg></label>
                <input type="radio" name="icon" id="i5" /><label for="i5"><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></label>
                <input type="radio" name="icon" id="i6" /><label for="i6"><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg></label>
              </div>
            </div>
            <div class="toggle-row" style="border:0;padding:0;">
              <div><b data-i18n="Published">Published</b><div class="muted" style="font-size:13px;">Off = saved as draft</div></div>
              <label class="toggle-switch"><input type="checkbox" id="cPublished" /><span class="track"></span></label>
            </div>
          </div>
        </section>

        <!-- Modules -->
        <section class="card card-pad" style="margin-bottom:20px;">
          <div class="between" style="margin-bottom:14px;"><h3 style="color:var(--core-navy);" data-i18n="Modules">Modules</h3>
            <button class="btn btn-light btn-sm" id="addModule" data-i18n="+ Add Module">+ Add Module</button></div>
          <div id="modules"></div>
        </section>

        <!-- Course materials (edit mode only — needs a saved course to attach to) -->
        <section class="card card-pad" style="margin-bottom:20px;display:none;" id="materialsSection">
          <div class="between" style="margin-bottom:6px;"><h3 style="color:var(--core-navy);" data-i18n="Course Materials">Course Materials</h3></div>
          <p class="muted" style="margin:0 0 14px;font-size:13px;">
            PDFs, slides, or video files. Only students enrolled in this course can open them, and downloading stays admin-only.
          </p>
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;">
            <input class="input" type="file" id="matFile" style="flex:1;min-width:220px;" />
            <input class="input" id="matTitle" placeholder="Display name (optional)" style="flex:1;min-width:180px;" />
            <button class="btn btn-primary btn-sm" id="matUpload" data-i18n="Upload">Upload</button>
          </div>
          <div id="matList"></div>
        </section>

        <!-- Assignments -->
        <section class="card card-pad" style="margin-bottom:20px;">
          <div class="between" style="margin-bottom:14px;"><h3 style="color:var(--core-navy);" data-i18n="Assignments">Assignments</h3>
            <button class="btn btn-light btn-sm" id="addAssignment" data-i18n="+ Add Assignment">+ Add Assignment</button></div>
          <div id="assignments"></div>
        </section>

        <div style="display:flex;gap:10px;">
          <button class="btn btn-primary" id="saveCourse" data-i18n="Save Course">Save Course</button>
          <a class="btn btn-light" href="teacher-courses.html" data-i18n="Cancel">Cancel</a>
        </div>

      </main>
    </div>
  </div>

  <script src="teacher-mock-data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="db.js"></script>
  <script src="icons.js"></script>
  <script src="i18n.js"></script>
  <script src="portal.js"></script>
  <script>
    portalBoot(function () {
    var courseId = new URLSearchParams(location.search).get("id");
    var isEdit = !!courseId;
    var modules = document.getElementById("modules");
    var assignments = document.getElementById("assignments");
    var modCount = 0;
    var iconOf = { i1: "" + ICON('shield') + "", i2: "" + ICON('fire') + "", i3: "" + ICON('building') + "", i4: "" + ICON('server') + "", i5: "" + ICON('globe') + "", i6: "" + ICON('sliders') + "" };
    /* what the course looked like when loaded — used to warn about deletions */
    var originalLessonIds = [], originalAssignmentIds = [];

    /* lesson: existing rows carry data-id so the save can update instead of re-insert */
    function lessonRow(lesson) {
      var row = document.createElement("div");
      row.className = "lesson-row";
      if (lesson && lesson.id) row.setAttribute("data-id", lesson.id);
      row.innerHTML =
        '<input class="input" placeholder="Lesson title" />' +
        '<select class="select"><option>Video</option><option>Reading</option><option>Lab</option><option>Quiz</option></select>' +
        '<input class="input" placeholder="Duration" />' +
        '<button type="button" class="row-remove" aria-label="Remove lesson">✕</button>';
      if (lesson) {
        var ins = row.querySelectorAll("input");
        ins[0].value = lesson.title || "";
        ins[1].value = lesson.duration || "";
        var sel = row.querySelector("select");
        var want = (lesson.type || "video").toLowerCase();
        for (var i = 0; i < sel.options.length; i++) {
          if (sel.options[i].value.toLowerCase() === want) { sel.selectedIndex = i; break; }
        }
      }
      row.querySelector(".row-remove").addEventListener("click", function () { row.remove(); });
      return row;
    }

    function addModule(mod) {
      modCount++;
      var item = document.createElement("div");
      item.className = "accordion-item is-builder open";
      if (mod && mod.id) item.setAttribute("data-id", mod.id);
      item.innerHTML =
        '<button class="accordion-head" type="button"><span>Module ' + modCount + '</span><span class="chev">▾</span></button>' +
        '<div class="accordion-body" style="padding:16px 18px;">' +
          '<label class="field-label">Module title</label>' +
          '<input class="input module-title" placeholder="e.g. CCTV Design" style="margin-bottom:12px;" />' +
          '<div class="lessons"></div>' +
          '<div style="display:flex;gap:8px;margin-top:6px;">' +
            '<button type="button" class="btn btn-light btn-sm add-lesson">+ Add lesson</button>' +
            '<button type="button" class="btn btn-light btn-sm remove-module" style="color:#c0392b;">Remove module</button>' +
          '</div>' +
        '</div>';
      var lessons = item.querySelector(".lessons");
      if (mod) {
        item.querySelector(".module-title").value = mod.title || "";
        (mod.lessons || []).forEach(function (l) { lessons.appendChild(lessonRow(l)); });
      }
      if (!lessons.children.length) lessons.appendChild(lessonRow());
      item.querySelector(".add-lesson").addEventListener("click", function () { lessons.appendChild(lessonRow()); });
      item.querySelector(".remove-module").addEventListener("click", function () { item.remove(); });
      modules.appendChild(item);
    }

    function addAssignment(a) {
      var row = document.createElement("div");
      row.className = "lesson-row";
      row.style.gridTemplateColumns = "1fr 160px 110px auto";
      if (a && a.id) row.setAttribute("data-id", a.id);
      row.innerHTML =
        '<input class="input" placeholder="Assignment title" />' +
        '<input class="input" type="date" />' +
        '<input class="input" type="number" placeholder="Max pts" />' +
        '<button type="button" class="row-remove" aria-label="Remove assignment">✕</button>';
      if (a) {
        var ins = row.querySelectorAll("input");
        ins[0].value = a.title || "";
        ins[1].value = a.due_date || "";
        ins[2].value = a.max_points || 100;
      }
      row.querySelector(".row-remove").addEventListener("click", function () { row.remove(); });
      assignments.appendChild(row);
    }

    document.getElementById("addModule").addEventListener("click", function () { addModule(); });
    document.getElementById("addAssignment").addEventListener("click", function () { addAssignment(); });

    /* read the whole form back out */
    function collect() {
      var iconRadio = document.querySelector('input[name="icon"]:checked');
      var course = {
        title: document.getElementById("cTitle").value.trim(),
        icon: iconOf[iconRadio ? iconRadio.id : "i1"] || "" + ICON('book') + "",
        description: document.getElementById("cDesc").value.trim(),
        status: document.getElementById("cPublished").checked ? "published" : "draft",
      };
      var modulesArr = [];
      document.querySelectorAll("#modules .accordion-item").forEach(function (item) {
        var mTitle = item.querySelector(".module-title").value.trim();
        if (!mTitle) return;
        var lessons = [];
        item.querySelectorAll(".lessons .lesson-row").forEach(function (row) {
          var ins = row.querySelectorAll("input");
          var t = ins[0].value.trim();
          if (!t) return;
          lessons.push({ id: row.getAttribute("data-id") || null, title: t,
            type: row.querySelector("select").value.toLowerCase(), duration: ins[1].value.trim() });
        });
        modulesArr.push({ id: item.getAttribute("data-id") || null, title: mTitle, lessons: lessons });
      });
      var assignmentsArr = [];
      document.querySelectorAll("#assignments .lesson-row").forEach(function (row) {
        var ins = row.querySelectorAll("input");
        var t = ins[0].value.trim();
        if (!t) return;
        assignmentsArr.push({ id: row.getAttribute("data-id") || null, title: t,
          due_date: ins[1].value || null, max_points: parseInt(ins[2].value, 10) || 100 });
      });
      return { course: course, modulesArr: modulesArr, assignmentsArr: assignmentsArr };
    }

    document.getElementById("saveCourse").addEventListener("click", function () {
      if (!dbReady()) { showToast("Course saved (demo)"); return; }
      var data = collect();
      if (!data.course.title) { showToast("Give the course a title first"); return; }
      var btn = this;

      if (!isEdit) {
        btn.disabled = true;
        dbCreateCourse(data.course, data.modulesArr, data.assignmentsArr, function (err) {
          if (err) { btn.disabled = false; showToast("Could not save: " + err); return; }
          showToast("Course created!");
          setTimeout(function () { window.location.href = "teacher-courses.html"; }, 700);
        });
        return;
      }

      /* editing: warn before anything that destroys student data */
      var keptLessons = [], keptAsgs = [];
      data.modulesArr.forEach(function (m) {
        m.lessons.forEach(function (l) { if (l.id) keptLessons.push(l.id); });
      });
      data.assignmentsArr.forEach(function (a) { if (a.id) keptAsgs.push(a.id); });
      var lostLessons = originalLessonIds.filter(function (x) { return keptLessons.indexOf(x) === -1; }).length;
      var lostAsgs = originalAssignmentIds.filter(function (x) { return keptAsgs.indexOf(x) === -1; }).length;
      if (lostLessons || lostAsgs) {
        var warn = "You are about to permanently delete:\n";
        if (lostAsgs) warn += "\n• " + lostAsgs + " assignment(s) — along with every student submission and grade for them";
        if (lostLessons) warn += "\n• " + lostLessons + " lesson(s) — along with students' completion progress";
        warn += "\n\nThis cannot be undone. Continue?";
        if (!confirm(warn)) return;
      }

      btn.disabled = true;
      dbUpdateCourse(courseId, data.course, data.modulesArr, data.assignmentsArr, function (err) {
        if (err) { btn.disabled = false; showToast("Could not save: " + err); return; }
        showToast("Course updated!");
        setTimeout(function () { window.location.href = "teacher-courses.html"; }, 700);
      });
    });

    /* ---- course materials (real file storage) ---- */
    function renderMaterials() {
      dbListMaterials(courseId, function (err, list) {
        var box = document.getElementById("matList");
        if (err) { box.innerHTML = '<p class="muted">Could not load materials: ' + esc(err) + "</p>"; return; }
        if (!list.length) { box.innerHTML = '<p class="muted" style="margin:0;">No materials uploaded yet.</p>'; return; }
        box.innerHTML = list.map(function (m) {
          return '<div class="list-row" style="margin-bottom:8px;">' +
            '<span class="course-icon" style="width:38px;height:38px;font-size:16px;margin:0;border-radius:10px;" aria-hidden="true">' + ICON("doc") + '</span>' +
            '<div class="grow"><b>' + esc(m.title) + "</b>" +
            '<div class="muted" style="font-size:12px;">' + esc(humanSize(m.size_bytes)) + " &middot; " + prettyDate(ymd(m.uploaded_at)) + "</div></div>" +
            '<button class="btn btn-light btn-sm" data-openmat="' + m.id + '">Open</button>' +
            '<button class="btn btn-light btn-sm" data-delmat="' + m.id + '" style="color:#c0392b;">Remove</button></div>';
        }).join("");
        box._items = list;
      });
    }

    document.getElementById("matUpload").addEventListener("click", function () {
      var f = document.getElementById("matFile").files[0];
      if (!f) { showToast("Choose a file first"); return; }
      if (f.size > 50 * 1024 * 1024) { showToast("File is larger than 50 MB"); return; }
      var btn = this; btn.disabled = true; btn.textContent = "Uploading…";
      dbUploadMaterial(courseId, f, document.getElementById("matTitle").value.trim(), function (err) {
        btn.disabled = false; btn.textContent = "Upload";
        if (err) { showToast("Upload failed: " + err); return; }
        document.getElementById("matFile").value = "";
        document.getElementById("matTitle").value = "";
        showToast("Material uploaded");
        renderMaterials();
      });
    });

    document.getElementById("matList").addEventListener("click", function (e) {
      var items = this._items || [];
      var open = e.target.closest("[data-openmat]");
      if (open) {
        var m = items.find(function (x) { return x.id === open.getAttribute("data-openmat"); });
        if (m) dbOpenFile("course-materials", m.file_path);
        return;
      }
      var del = e.target.closest("[data-delmat]");
      if (del) {
        var mm = items.find(function (x) { return x.id === del.getAttribute("data-delmat"); });
        if (!mm || !confirm('Remove "' + mm.title + '"? Students will lose access to it.')) return;
        del.disabled = true;
        dbDeleteMaterial(mm, function (err) {
          if (err) { del.disabled = false; showToast("Could not remove: " + err); return; }
          showToast("Material removed");
          renderMaterials();
        });
      }
    });

    /* ---- initial state ---- */
    if (isEdit && dbReady()) {
      document.getElementById("materialsSection").style.display = "";
      renderMaterials();
    }
    if (isEdit && dbReady()) {
      document.getElementById("builderTitle").textContent = "Loading course…";
      dbLoadCourseForEdit(courseId, function (err, c) {
        if (err || !c) {
          document.getElementById("builderTitle").textContent = "Course not found";
          showToast(err || "That course could not be loaded");
          return;
        }
        document.getElementById("builderTitle").textContent = "Edit Course";
        document.getElementById("cTitle").value = c.title || "";
        document.getElementById("cDesc").value = c.description || "";
        document.getElementById("cPublished").checked = c.status === "published";
        var sel = document.getElementById("cDiscipline");
        for (var i = 0; i < sel.options.length; i++) {
          if (sel.options[i].value === c.title) { sel.selectedIndex = i; break; }
        }
        Object.keys(iconOf).forEach(function (k) {
          if (iconOf[k] === c.icon) { var el = document.getElementById(k); if (el) el.checked = true; }
        });
        (c.modules || []).forEach(function (m) {
          addModule(m);
          (m.lessons || []).forEach(function (l) { originalLessonIds.push(l.id); });
        });
        (c.assignmentsList || []).forEach(function (a) { addAssignment(a); originalAssignmentIds.push(a.id); });
        if (!modules.children.length) addModule();
        if (!assignments.children.length) addAssignment();
      });
    } else {
      if (isEdit) document.getElementById("builderTitle").textContent = "Edit Course";
      addModule();
      addAssignment();
    }
    });
  </script>
</body>
</html>
