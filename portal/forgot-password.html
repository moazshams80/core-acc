<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset your password — CORE Egypt Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="portal.css" />
</head>
<body>
  <div class="login-wrap">
    <aside class="login-aside">
      <span class="brand-mark">C</span>
      <h1>Locked out?<br />Let's fix that.</h1>
      <p>Enter the email you signed up with and we'll send you a link to choose a new password.</p>
      <svg width="320" height="160" viewBox="0 0 320 160" fill="none" aria-hidden="true" style="margin-top:36px;opacity:.5;">
        <g stroke="#22a7e0" stroke-width="1.5">
          <path d="M10 130 H110 L150 90 H250" /><path d="M10 80 H70 L100 50 H300" /><path d="M40 150 V110 L80 70" />
        </g>
        <g fill="#22a7e0">
          <circle cx="110" cy="130" r="4" /><circle cx="150" cy="90" r="4" /><circle cx="250" cy="90" r="4" />
          <circle cx="70" cy="80" r="4" /><circle cx="100" cy="50" r="4" /><circle cx="80" cy="70" r="4" />
        </g>
      </svg>
    </aside>

    <main class="login-form-panel">
      <div class="login-form-card card card-pad">
        <p class="kicker">Password Reset</p>
        <h2 class="section-title" style="margin-bottom:6px;" data-i18n="Forgot your password?">Forgot your password?</h2>
        <p class="muted" style="margin:0 0 22px;font-size:14px;">We'll email you a secure link to set a new one.</p>

        <form id="forgotForm" class="stack" autocomplete="off">
          <div>
            <label class="field-label" for="email" data-i18n="Email address">Email address</label>
            <input class="input" id="email" type="email" placeholder="you@example.com" required />
            <p id="msg" style="display:none;margin:8px 0 0;font-size:13px;font-weight:700;"></p>
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="sendBtn" data-i18n="Send reset link">Send reset link</button>
          <div class="divider">or</div>
          <p style="text-align:center;margin:0;font-size:14px;" class="muted">
            Remembered it? <a href="login.html" style="color:var(--core-blue);font-weight:700;" data-i18n="Back to sign in">Back to sign in</a>
          </p>
        </form>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="db.js"></script>
  <script src="icons.js"></script>
  <script src="i18n.js"></script>
  <script src="portal.js"></script>
  <script>
    document.getElementById("forgotForm").addEventListener("submit", function (e) {
      e.preventDefault();
      var msg = document.getElementById("msg");
      var btn = document.getElementById("sendBtn");
      var email = document.getElementById("email").value.trim();

      function say(text, ok) {
        msg.textContent = text;
        msg.style.color = ok ? "#1b8a4b" : "#c0392b";
        msg.style.display = "block";
      }

      if (!dbReady()) { say("Password reset needs the live database.", false); return; }
      btn.disabled = true; btn.textContent = "Sending…";
      dbSendPasswordReset(email, function (err) {
        btn.disabled = false; btn.textContent = "Send reset link";
        // Always answer the same way — never reveal whether an address is registered.
        if (err && /rate|limit/i.test(err)) { say("Too many attempts. Please wait a minute and try again.", false); return; }
        say("If an account exists for that address, a reset link is on its way. Check your inbox and spam folder.", true);
      });
    });
  </script>
</body>
</html>
