<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — CORE Academy Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="portal.css" />
</head>
<body data-page="profile">
  <div class="portal-shell">
    <aside class="portal-sidebar" id="portalSidebar"></aside>
    <div class="portal-overlay" id="portalOverlay"></div>
    <div class="portal-content">
      <header class="portal-header" id="portalHeader"></header>
      <main class="portal-main">

        <div class="profile-grid" id="profileLayout">
          <!-- Left: profile card -->
          <section class="card card-pad" style="text-align:center;height:fit-content;" id="profileCard"></section>

          <!-- Right: tabbed sections -->
          <section class="card card-pad">
            <div class="tabs">
              <button class="active" data-tab="pi" data-tab-group="pf">Personal Info</button>
              <button data-tab="sec" data-tab-group="pf">Security</button>
              <button data-tab="notif" data-tab-group="pf">Notifications</button>
            </div>

            <div id="pi" class="tab-panel active" data-tab-panel-group="pf">
              <form class="stack" style="max-width:560px;" onsubmit="event.preventDefault(); alert('Changes saved! (demo)');">
                <div><label class="field-label">Full Name</label><input class="input" id="f-name" /></div>
                <div><label class="field-label">Email</label><input class="input" id="f-email" type="email" /></div>
                <div><label class="field-label">Phone</label><input class="input" id="f-phone" /></div>
                <div><label class="field-label">Date of Birth</label><input class="input" id="f-dob" type="date" /></div>
                <div><label class="field-label">Address</label><textarea class="textarea" id="f-addr"></textarea></div>
                <button class="btn btn-primary" style="justify-self:start;">Save Changes</button>
              </form>
            </div>

            <div id="sec" class="tab-panel" data-tab-panel-group="pf">
              <form class="stack" style="max-width:460px;" onsubmit="event.preventDefault(); alert('Password updated! (demo)');">
                <div><label class="field-label">Current Password</label><input class="input" type="password" placeholder="••••••••" /></div>
                <div><label class="field-label">New Password</label><input class="input" type="password" placeholder="••••••••" /></div>
                <div><label class="field-label">Confirm New Password</label><input class="input" type="password" placeholder="••••••••" /></div>
                <button class="btn btn-primary" style="justify-self:start;">Update Password</button>
              </form>
            </div>

            <div id="notif" class="tab-panel" data-tab-panel-group="pf" style="max-width:520px;">
              <div class="toggle-row"><div><b>Email notifications</b><div class="muted" style="font-size:13px;">General account and course emails</div></div>
                <label class="toggle-switch"><input type="checkbox" checked /><span class="track"></span></label></div>
              <div class="toggle-row"><div><b>Assignment reminders</b><div class="muted" style="font-size:13px;">Get nudged before due dates</div></div>
                <label class="toggle-switch"><input type="checkbox" checked /><span class="track"></span></label></div>
              <div class="toggle-row"><div><b>Live session reminders</b><div class="muted" style="font-size:13px;">Alerts 15 minutes before sessions</div></div>
                <label class="toggle-switch"><input type="checkbox" checked /><span class="track"></span></label></div>
              <div class="toggle-row"><div><b>Certificate updates</b><div class="muted" style="font-size:13px;">When a new certificate is issued</div></div>
                <label class="toggle-switch"><input type="checkbox" /><span class="track"></span></label></div>
            </div>
          </section>
        </div>

      </main>
    </div>
  </div>

  <script src="mock-data.js"></script>
  <script src="portal.js"></script>
  <script>
    var s = currentStudent;
    document.getElementById("profileCard").innerHTML =
      avatarHTML(s.avatarInitials, "avatar-lg") +
      '<div style="margin-top:14px;"><button class="btn btn-light btn-sm">Edit avatar</button></div>' +
      '<h2 class="section-title" style="font-size:22px;margin-top:16px;">' + esc(s.name) + "</h2>" +
      '<p class="muted" style="margin:4px 0 16px;">' + esc(s.id) + "</p>" +
      '<div style="text-align:left;border-top:1px solid var(--core-border);padding-top:16px;display:grid;gap:10px;font-size:14px;">' +
        '<div class="between"><span class="muted">Program</span><b style="text-align:right;">' + esc(s.program) + "</b></div>" +
        '<div class="between"><span class="muted">Member since</span><b>' + esc(s.joinDate) + "</b></div>" +
        '<div class="between"><span class="muted">Status</span>' + '<span class="badge badge-success">Active</span></div>' +
      "</div>";

    document.getElementById("f-name").value = s.name;
    document.getElementById("f-email").value = s.email;
    document.getElementById("f-phone").value = s.phone;
    document.getElementById("f-dob").value = s.dob;
    document.getElementById("f-addr").value = s.address;

    // open Security tab if URL hash requests it
    if (location.hash === "#security") {
      document.querySelector('[data-tab="sec"]').click();
    }
  </script>
</body>
</html>
