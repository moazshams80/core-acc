<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course — CORE Egypt Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="portal.css" />
</head>
<body data-page="course-detail" data-title="Course">
  <div class="portal-shell">
    <aside class="portal-sidebar" id="portalSidebar"></aside>
    <div class="portal-overlay" id="portalOverlay"></div>
    <div class="portal-content">
      <header class="portal-header" id="portalHeader"></header>
      <main class="portal-main">

        <a href="courses.html" class="muted" style="font-weight:700;display:inline-block;margin-bottom:16px;">← Back to courses</a>

        <section class="card card-pad" id="courseHead" style="margin-bottom:22px;"></section>

        <div class="tabs">
          <button class="active" data-tab="tab-overview" data-tab-group="cd" data-i18n="Overview">Overview</button>
          <button data-tab="tab-modules" data-tab-group="cd" data-i18n="Modules">Modules</button>
          <button data-tab="tab-materials" data-tab-group="cd" data-i18n="Materials">Materials</button>
          <button data-tab="tab-discussion" data-tab-group="cd" data-i18n="Discussion">Discussion</button>
        </div>

        <div id="tab-overview" class="tab-panel active" data-tab-panel-group="cd"></div>
        <div id="tab-modules" class="tab-panel" data-tab-panel-group="cd"></div>
        <div id="tab-materials" class="tab-panel" data-tab-panel-group="cd">
          <div class="card card-pad protected-content" id="materialViewer">
            <h3 style="color:var(--core-navy);margin-bottom:10px;">Course Materials <span class="badge badge-cyan" data-i18n="Protected">Protected</span></h3>
            <p class="muted" style="margin:0 0 14px;font-size:13px;">
              Licensed to you only — each file is watermarked with your name and ID. Copying, printing and screenshots are disabled.
            </p>
            <div id="materialList"></div>
          </div>
          <div style="margin-top:14px;" id="materialDownload"></div>
        </div>
        <div id="tab-discussion" class="tab-panel" data-tab-panel-group="cd">
          <div class="empty-state"><div class="es-ico"><svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></div><h3>Discussion is quiet</h3><p>Start a thread with your instructor and classmates.</p></div>
        </div>

      </main>
    </div>
  </div>

  <script src="mock-data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="db.js"></script>
  <script src="icons.js"></script>
  <script src="i18n.js"></script>
  <script src="portal.js"></script>
  <script>
    portalBoot(function () {
    var id = new URLSearchParams(location.search).get("id");
    var course = courseById(id) || courses[0];
    if (!course) {
      document.querySelector(".portal-main").innerHTML =
        '<div class="empty-state"><div class="es-ico">' + ICON("book") + '</div><h3>No courses yet</h3><p>Once courses are published you\'ll find them here.</p><a class="btn btn-primary btn-sm" href="courses.html">Back to courses</a></div>';
      return;
    }
    document.body.setAttribute("data-title", course.title);
    var h1 = document.querySelector("#portalHeader h1"); if (h1) h1.textContent = course.title;

    // Header
    document.getElementById("courseHead").innerHTML =
      '<div style="display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap;">' +
        '<span class="course-icon" style="margin:0;" aria-hidden="true">' + course.icon + "</span>" +
        '<div class="grow" style="flex:1;min-width:240px;">' +
          '<div class="between"><h2 class="section-title" style="font-size:24px;">' + esc(course.title) + "</h2>" + badgeHTML(course.status) + "</div>" +
          '<p class="muted" style="margin:6px 0 14px;">' + esc(course.instructor) + " &middot; Enrolled " + esc(course.enrolledOn) + "</p>" +
          progressHTML(course.progress, true) +
        "</div>" +
      "</div>";

    // Overview
    document.getElementById("tab-overview").innerHTML =
      '<div class="card card-pad"><p>' + esc(course.description) + "</p>" +
      '<h3 style="color:var(--core-navy);margin:18px 0 10px;">Learning Outcomes</h3>' +
      '<ul class="checklist">' + course.outcomes.map(function (o) { return "<li>" + esc(o) + "</li>"; }).join("") + "</ul>" +
      '<div style="margin-top:18px;display:flex;gap:8px;flex-wrap:wrap;">' + course.tags.map(function (tg) { return '<span class="tag">' + esc(tg) + "</span>"; }).join("") + "</div></div>";

    // Modules accordion
    var lessonIcon = { video: "▶", reading: "" + ICON('doc') + "" };
    document.getElementById("tab-modules").innerHTML = course.modules.map(function (m, i) {
      var lessons = m.lessons.map(function (l) {
        var ic = l.done ? '<span class="lic done">✓</span>' : '<span class="lic">' + lessonIcon[l.type] + "</span>";
        return '<div class="lesson">' + ic + "<span>" + esc(l.title) + '</span><span class="len">' + esc(l.length) + "</span></div>";
      }).join("");
      return '<div class="accordion-item' + (i === 0 ? " open" : "") + '">' +
        '<button class="accordion-head"><span>' + esc(m.title) + '</span>' +
        '<span class="muted" style="font-weight:700;font-size:13px;">' + m.lessons.length + " lesson" + (m.lessons.length === 1 ? "" : "s") + ' &nbsp;<span class="chev">▾</span></span></button>' +
        '<div class="accordion-body">' + lessons + "</div></div>";
    }).join("");

    // Course materials — real files, viewed through short-lived signed links.
    // Viewing is allowed for enrolled students; downloading stays admin-only.
    var matBox = document.getElementById("materialList");
    if (!dbReady()) {
      matBox.innerHTML = '<p class="muted" style="margin:0;">Materials appear here once the database is connected.</p>';
      document.getElementById("materialDownload").innerHTML = canDownload() ? "" : downloadLockHTML();
    } else {
      dbListMaterials(course.id, function (err, list) {
        if (err) { matBox.innerHTML = '<p class="muted" style="margin:0;">Could not load materials.</p>'; return; }
        if (!list.length) {
          matBox.innerHTML = '<div class="empty-state" style="padding:24px;"><div class="es-ico">' + ICON("folder") + '</div><h3>No materials yet</h3><p>Your instructor hasn\'t uploaded anything for this course.</p></div>';
          return;
        }
        matBox._items = list;
        matBox.innerHTML = list.map(function (m) {
          var action = canDownload()
            ? '<button class="btn btn-light btn-sm" data-openmat="' + m.id + '">Download</button>'
            : '<button class="btn btn-light btn-sm" data-openmat="' + m.id + '">Open</button>';
          return '<div class="list-row" style="margin-bottom:8px;">' +
            '<span class="course-icon" style="width:38px;height:38px;font-size:16px;margin:0;border-radius:10px;" aria-hidden="true">' + ICON("doc") + '</span>' +
            '<div class="grow"><b>' + esc(m.title) + "</b>" +
            '<div class="muted" style="font-size:12px;">' + esc(humanSize(m.size_bytes)) + "</div></div>" + action + "</div>";
        }).join("");
      });
      matBox.addEventListener("click", function (e) {
        var b = e.target.closest("[data-openmat]"); if (!b) return;
        var m = (this._items || []).find(function (x) { return x.id === b.getAttribute("data-openmat"); });
        if (m) dbOpenFile("course-materials", m.file_path);
      });
      document.getElementById("materialDownload").innerHTML = canDownload() ? "" : downloadLockHTML();
    }
    });
  </script>
</body>
</html>
