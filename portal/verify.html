<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify a Certificate — CORE Egypt</title>
  <meta name="description" content="Check that a CORE Egypt certificate is genuine." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="portal.css" />
  <style>
    /* standalone public page — no portal shell */
    .verify-wrap { min-height: 100vh; display: grid; place-items: center; padding: 28px 20px;
      background: linear-gradient(135deg, var(--core-dark), var(--core-navy)); }
    .verify-card { width: min(560px, 100%); background: #fff; border-radius: var(--core-radius);
      box-shadow: var(--core-shadow); padding: 34px; text-align: center; }
    .verify-status { display: inline-flex; align-items: center; gap: 9px; font-weight: 800;
      padding: 11px 18px; border-radius: 999px; margin-bottom: 18px; }
    .ok { background: #e4f6ec; color: #1b8a4b; }
    .bad { background: #fdecec; color: #c0392b; }
    .verify-row { display: flex; justify-content: space-between; gap: 14px; padding: 12px 0;
      border-bottom: 1px solid var(--core-border); text-align: left; font-size: 15px; }
    .verify-row:last-child { border-bottom: 0; }
    .verify-row span { color: var(--core-muted); }
    .verify-row b { color: var(--core-navy); text-align: right; }
  </style>
</head>
<body>
  <div class="verify-wrap">
    <div class="verify-card">
      <div class="brand" style="justify-content:center;margin-bottom:8px;">
        <span class="brand-mark">C</span><span style="font-weight:800;color:var(--core-navy);">CORE Egypt</span>
      </div>
      <p class="kicker" style="margin-bottom:18px;">Certificate Verification</p>

      <div id="result">
        <p class="muted">Checking…</p>
      </div>

      <form id="againForm" style="margin-top:22px;display:flex;gap:8px;">
        <input class="input" id="codeInput" placeholder="Enter a code, e.g. CORE-2026-A1B2C3" style="flex:1;" />
        <button class="btn btn-primary btn-sm" type="submit" data-i18n="Verify">Verify</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="db.js"></script>
  <script>
    var box = document.getElementById("result");

    function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]; }); }

    function show(html) { box.innerHTML = html; }

    function invalid(code) {
      show('<div class="verify-status bad">✕ Not found</div>' +
        '<p class="muted" style="margin:0;">No certificate matches <b>' + esc(code) + '</b>.</p>' +
        '<p class="muted" style="margin:10px 0 0;font-size:13px;">Check the code for typos. If it still fails, the certificate may have been revoked.</p>');
    }

    function verify(code) {
      code = (code || "").trim();
      if (!code) { show('<p class="muted">Enter a verification code to check a certificate.</p>'); return; }
      if (!dbReady()) { show('<p class="muted">Verification is unavailable right now.</p>'); return; }
      show('<p class="muted">Checking ' + esc(code) + "…</p>");
      dbVerifyCertificate(code, function (err, rec) {
        if (err) { show('<p class="muted">Could not check that code right now.</p>'); return; }
        if (!rec) { invalid(code); return; }
        var issued = new Date(rec.issued_at).toLocaleDateString("en-US", { month: "long", year: "numeric" });
        show('<div class="verify-status ok">✓ Genuine certificate</div>' +
          '<div style="margin-top:6px;">' +
            '<div class="verify-row"><span>Awarded to</span><b>' + esc(rec.student_first_name) + "</b></div>" +
            '<div class="verify-row"><span>Programme</span><b>' + esc(rec.course_title) + "</b></div>" +
            '<div class="verify-row"><span>Issued</span><b>' + esc(issued) + "</b></div>" +
            '<div class="verify-row"><span>Code</span><b>' + esc(code) + "</b></div>" +
          "</div>" +
          '<p class="muted" style="margin:16px 0 0;font-size:13px;">Issued by CORE Egypt and confirmed against our records just now.</p>');
      });
    }

    document.getElementById("againForm").addEventListener("submit", function (e) {
      e.preventDefault();
      var c = document.getElementById("codeInput").value;
      history.replaceState(null, "", location.pathname + "?code=" + encodeURIComponent(c.trim()));
      verify(c);
    });

    var initial = new URLSearchParams(location.search).get("code");
    if (initial) document.getElementById("codeInput").value = initial;
    verify(initial);
  </script>
  <script src="icons.js"></script>
  <script src="i18n.js"></script>
</body>
</html>
