<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificates — CORE Egypt Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="portal.css" />
</head>
<body data-page="certificates">
  <div class="portal-shell">
    <aside class="portal-sidebar" id="portalSidebar"></aside>
    <div class="portal-overlay" id="portalOverlay"></div>
    <div class="portal-content">
      <header class="portal-header" id="portalHeader"></header>
      <main class="portal-main">

        <div class="page-head">
          <h2 class="section-title" style="font-size:22px;">Your Certificates</h2>
          <p>Earn a verified certificate for every course you complete. Each one carries a unique code and QR authentication.</p>
        </div>

        <div class="cert-grid" id="certGrid"></div>

      </main>
    </div>
  </div>

  <!-- Verification modal -->
  <div class="portal-modal" id="verifyModal">
    <div class="backdrop" data-modal-close></div>
    <div class="modal-card" style="text-align:center;">
      <div class="modal-head"><h3>Certificate Verification</h3><button class="modal-close" data-modal-close aria-label="Close">×</button></div>
      <div class="qr qr-lg" style="margin:8px auto 16px;" aria-hidden="true"></div>
      <p style="margin:0 0 4px;font-weight:800;color:var(--core-navy);" id="vCode"></p>
      <p class="muted" id="vCourse" style="margin:0 0 14px;"></p>
      <p style="display:inline-flex;align-items:center;gap:8px;background:#e4f6ec;color:#1b8a4b;font-weight:800;padding:10px 16px;border-radius:999px;margin:0 0 14px;">✅ This certificate is authentic</p>
      <p style="margin:0;font-size:14px;"><a id="vLink" href="#" target="_blank" rel="noopener" style="color:var(--core-blue);font-weight:700;"></a></p>
      <p class="muted" style="margin:8px 0 0;font-size:12px;">Share this link (or the QR code) with an employer — it works without logging in.</p>
    </div>
  </div>

  <script src="mock-data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="db.js"></script>
  <script src="portal.js"></script>
  <script>
    portalBoot(function () {
    if (!certificates.length) {
      document.getElementById("certGrid").innerHTML =
        '<div class="empty-state" style="grid-column:1/-1;"><div class="es-ico">🎓</div><h3>No certificates yet</h3><p>Complete a course to earn your first verified certificate.</p></div>';
    }
    document.getElementById("certGrid").innerHTML += certificates.map(function (cert) {
      var course = courseById(cert.courseId);
      if (cert.earned) {
        return '<article class="cert-card">' +
          '<div class="cert-brand"><span class="brand-mark" style="width:30px;height:30px;font-size:15px;" aria-hidden="true">C</span> CORE EGYPT</div>' +
          '<div class="cert-kind">Certificate of Completion</div>' +
          '<div class="cert-prog">' + esc(course.title) + "</div>" +
          '<div class="cert-name">' + esc(currentStudent.name) + "</div>" +
          '<div class="cert-foot"><span class="qr" aria-hidden="true"></span>' +
            '<span class="cert-meta"><strong>Verification:</strong> ' + esc(cert.verificationCode) + "<br>" +
            '<strong>Issued:</strong> ' + esc(cert.dateEarned) + "</span></div>" +
          '<div class="cert-actions">' +
            (cert.filePath ? '<button class="btn btn-primary btn-sm btn-block" data-viewcert="' + esc(cert.filePath) + '">View Certificate</button>' : "") +
            '<button class="btn btn-light btn-sm btn-block" data-modal-open="verifyModal" data-code="' + esc(cert.verificationCode) + '" data-course="' + esc(course.title) + '">Verify</button></div>' +
          "</article>";
      }
      return '<article class="cert-card locked">' +
        '<div class="cert-brand"><span class="brand-mark" style="width:30px;height:30px;font-size:15px;background:#45525f;box-shadow:none;" aria-hidden="true">C</span> CORE EGYPT</div>' +
        '<div class="cert-kind">Certificate of Completion</div>' +
        '<div class="cert-prog">' + esc(course.title) + "</div>" +
        '<div class="cert-name">' + esc(currentStudent.name) + "</div>" +
        '<div class="cert-foot"><span class="qr" style="filter:grayscale(1);opacity:.5;" aria-hidden="true"></span>' +
          '<span class="cert-meta"><strong>Verification:</strong> —<br>Locked</span></div>' +
        '<div class="cert-lock"><span class="lk" aria-hidden="true">🔒</span><span>Complete course to unlock</span></div>' +
        "</article>";
    }).join("");

    // open the issued certificate file (private bucket, signed link)
    document.addEventListener("click", function (e) {
      var v = e.target.closest("[data-viewcert]"); if (!v) return;
      dbOpenFile("certificates", v.getAttribute("data-viewcert"));
    });

    // populate verification modal on open
    document.addEventListener("click", function (e) {
      var b = e.target.closest('[data-modal-open="verifyModal"]'); if (!b) return;
      var code = b.getAttribute("data-code");
      document.getElementById("vCode").textContent = code;
      document.getElementById("vCourse").textContent = b.getAttribute("data-course");
      // public link anyone can open to check this certificate
      var url = location.origin + location.pathname.replace(/[^/]*$/, "") + "verify.html?code=" + encodeURIComponent(code);
      var link = document.getElementById("vLink");
      link.href = url;
      link.textContent = "Open public verification page";
    });
    });
  </script>
</body>
</html>
